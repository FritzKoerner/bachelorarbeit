env:
  n_envs: 16
  max_episode_steps: 500
  image_width: 64
  image_height: 64
  camera_fov: 70
scene:
  strip_width: 2.0
  strip_length: 50.0
  num_strips: 5
  show_viewer: false
spawn:
  height_min: 6.0
  height_max: 10.0
  x_range: 20.0
  y_range: 4.0
controller:
  base_hover_rpm: 1789.2
  max_rpm: 25000
  kp_vel: 5.0
  kd_vel: 1.0
  kp_att: 10.0
  vel_scale: 2.0
  yaw_scale: 1.0
ppo:
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  ppo_epochs: 10
  batch_size: 64
  rollout_steps: 32
reward:
  w_descent: 1.0
  w_velocity: 0.5
  w_semantic: 2.0
  w_landing: 100.0
  w_crash: -50.0
  w_smooth: 0.1
  landing_height: 0.3
  safe_landing_vel: 0.5
  crash_vel: 2.0
  crash_angle: 0.5
network:
  hidden_dim: 256
  visual_feature_dim: 256
logging:
  log_dir: ./runs
  save_interval: 100
  log_interval: 10
experiment:
  seed: 42
